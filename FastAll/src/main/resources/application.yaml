# 文件存储配置
file:
  storage:
    type: cos
  local:
    path: /opt/jenkins_home/fastall/uploads
    prefix: http://localhost:8080/files/
  cos:
    secret-id: ${TENCENT_CLOUD_SECRET_ID:fake-id}
    secret-key: ${TENCENT_CLOUD_SECRET_KEY:fake-key}
    bucket: fast-data-1259261503
    region: ap-guangzhou
    baseUrl: https://fast-data-1259261503.cos.ap-guangzhou.myqcloud.com

  allowed-extensions: pdf,doc,docx,xls,xlsx,ppt,pptx,txt,csv,json,xml,jpg,jpeg,png,gif,bmp,svg,zip,rar,7z,tar,gz
  max-size: 104857600

# 敏感配置加密
encrypt:
  key: fastcrud-2026-secret

# 验证码配置
aj:
  captcha:
    cache-type: redis
    type: blockPuzzle
    water-mark: FastCRUD
    slip-offset: 5
    aes-status: true
    interference-options: 1
    expire-second: 120

spring:
  application:
    name: FastCRUD
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  redis:
    host: ${REDIS_HOST:124.223.43.124}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:Redis@123456}
    database: ${REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://124.223.43.124:3306/FastCRUD?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true&tinyInt1isBit=false}
    username: ${DATABASE_USERNAME:guapigoutou}
    password: ${DATABASE_PASSWORD:Nfctbfqljt9.22!}
    driver: ${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/*.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
server:
  port: 8081